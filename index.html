  <body>
    <div class="container">
      <div class="logo">
        <h1><img src="./assets/logo.png" alt="Logomarca de code wifi" /></h1>

        <p>Cadastro de Assinatura</p>
      </div>

      <form id="cadastroForm">
        <h2>FICHA PESSOA FÍSICA</h2>

        <div class="grid">
          <div class="full">
            <label>NOME*</label>
            <input type="text" id="nome" required />
          </div>

          <div>
            <label>CPF*</label>
            <input type="text" id="cpf" required />
          </div>

          <div>
            <label>DATA DE NASCIMENTO*</label>
            <input type="date" id="nascimento" required />
          </div>

          <div>
            <label>TELEFONE 1*</label>
            <input type="text" id="telefone1" required />
          </div>

          <div>
            <label>TELEFONE 2*</label>
            <input type="text" id="telefone2" required />
          </div>

          <div class="full">
            <label>EMAIL*</label>
            <input type="email" id="email" required />
          </div>
        </div>

        <h2>ENDEREÇO</h2>

        <div class="grid">
          <div class="full">
            <label>RUA*</label>
            <input type="text" id="rua" required />
          </div>

          <div>
            <label>Nº*</label>
            <input type="text" id="numero" required />
          </div>

          <div>
            <label>COMPLEMENTO*</label>
            <input type="text" id="complemento" />
          </div>

          <div>
            <label>CEP*</label>
            <input type="text" id="cep" required />
          </div>

          <div>
            <label>BAIRRO*</label>
            <input type="text" id="bairro" required />
          </div>

          <div>
            <label>CIDADE*</label>
            <input type="text" id="cidade" required />
          </div>
        </div>

        <h2>PLANO</h2>

        <div class="planos">
          <label class="radio-group">
            <input
              type="radio"
              name="plano"
              value="1G - R$178.00 + Mesh + NBA"
            />
            1G - R$178.00 + Mesh + NBA
          </label>

          <label class="radio-group">
            <input type="radio" name="plano" value="1G - R$139.00" />
            1G - R$139.00
          </label>

          <label class="radio-group">
            <input
              type="radio"
              name="plano"
              value="800M + HBO MAX - R$129.00"
            />
            800M + HBO MAX - R$129.00
          </label>

          <label class="radio-group">
            <input
              type="radio"
              name="plano"
              value="800M + TELECINE - R$129.00"
            />
            800M + TELECINE - R$129.00
          </label>

          <label class="radio-group">
            <input
              type="radio"
              name="plano"
              value="800M + GLOBO PLAY - R$125.00"
            />
            800M + GLOBO PLAY - R$125.00
          </label>

          <label class="radio-group">
            <input type="radio" name="plano" value="PREMIERE - R$49.90" />
            PREMIERE - R$49.90
          </label>

          <label class="radio-group">
            <input type="radio" name="plano" value="800M - R$109.00" />
            800M - R$109.00
          </label>

          <label class="radio-group">
            <input type="radio" name="plano" value="600M - R$99.00" />
            600M - R$99.00
          </label>
        </div>

        <h2>VENCIMENTO</h2>

        <div class="vencimento">
          <label>
            <input type="radio" name="vencimento" value="10" /> 10
          </label>

          <label>
            <input type="radio" name="vencimento" value="15" /> 15
          </label>

          <label>
            <input type="radio" name="vencimento" value="20" /> 20
          </label>
        </div>
        <label class="checkbox-lgpd">
          <input type="checkbox" required />
          Autorizo o uso dos meus dados para contato e contratação dos serviços.
        </label>
        <button type="submit">ENVIAR CADASTRO</button>
      </form>
    </div>
    <footer>
      <p>
        Seus dados são utilizados apenas para contato e contratação dos serviços
        da Code Wifi.
      </p>
    </footer>
    <script>
      document
        .getElementById("cadastroForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const nome = document.getElementById("nome").value;
          const cpf = document.getElementById("cpf").value;
          const nascimento = document.getElementById("nascimento").value;
          const telefone1 = document.getElementById("telefone1").value;
          const telefone2 = document.getElementById("telefone2").value;
          const email = document.getElementById("email").value;

          const rua = document.getElementById("rua").value;
          const numero = document.getElementById("numero").value;
          const complemento = document.getElementById("complemento").value;
          const cep = document.getElementById("cep").value;
          const bairro = document.getElementById("bairro").value;
          const cidade = document.getElementById("cidade").value;

          const plano =
            document.querySelector('input[name="plano"]:checked')?.value || "";
          const vencimento =
            document.querySelector('input[name="vencimento"]:checked')?.value ||
            "";

          const mensagem = `*NOVO CADASTRO CODE WIFI*%0A%0A
*NOME:* ${nome}%0A
*CPF:* ${cpf}%0A
*NASCIMENTO:* ${nascimento}%0A
*TELEFONE 1:* ${telefone1}%0A
*TELEFONE 2:* ${telefone2}%0A
*EMAIL:* ${email}%0A%0A

*ENDEREÇO*%0A
*RUA:* ${rua}%0A
*NÚMERO:* ${numero}%0A
*COMPLEMENTO:* ${complemento}%0A
*CEP:* ${cep}%0A
*BAIRRO:* ${bairro}%0A
*CIDADE:* ${cidade}%0A%0A

*PLANO:* ${plano}%0A
*VENCIMENTO:* ${vencimento}`;
          fbq("track", "Lead");

          setTimeout(() => {
            window.open(
              `https://wa.me/5531984362710?text=${mensagem}`,
              "_blank"
            );
          }, 800);
        });
    </script>
